<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>visual scores · 2d</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #fafaf6;
        --ink: #0a0a0a;
        --accent: #d4282a;
        --dark: #0a0a0a;
        --cream: #efe9d8;
        --ui-tint: 239, 233, 216;
        --panel-bg: rgba(10, 10, 10, 0.92);
        --panel-border: rgba(239, 233, 216, 0.18);
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--dark);
        color: var(--cream);
        font-family: "EB Garamond", "Cormorant Garamond", Georgia, "Times New Roman", serif;
        font-feature-settings: "liga", "dlig";
      }

      /* --- Canvas viewport --- */
      #app {
        position: fixed;
        inset: 0;
        overflow: auto;
        padding: 40px;
        display: flex;
        align-items: safe center;
        justify-content: safe center;
      }
      #canvas-host {
        background: var(--cream);
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.08), 0 30px 80px rgba(0, 0, 0, 0.6);
        flex: 0 0 auto;
        width: fit-content;
      }
      #canvas-host canvas { display: block; }

      /* --- Title (top-center) --- */
      #title {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 13px;
        letter-spacing: 0.04em;
        opacity: 0.85;
        text-align: center;
        z-index: 10;
      }
      #title .small { font-size: 10px; opacity: 0.55; margin-left: 8px; font-style: italic; }
      #title a { color: var(--cream); opacity: 0.5; text-decoration: none; }
      #title a:hover { opacity: 1; }

      /* --- HUD (top-left keyboard hints) --- */
      #hud {
        position: fixed;
        top: 56px;
        left: 16px;
        font-size: 12px;
        line-height: 1.7;
        pointer-events: none;
        user-select: none;
        opacity: 0.85;
      }
      #hud .row { display: flex; gap: 8px; align-items: baseline; }
      #hud .k {
        display: inline-block;
        min-width: 36px;
        padding: 1px 6px;
        border: 1px solid rgba(var(--ui-tint), 0.25);
        background: rgba(var(--ui-tint), 0.04);
        text-align: center;
        font-size: 10px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      #hud .v { opacity: 0.7; font-style: italic; }

      /* --- Seed + weights footers --- */
      #seed-display {
        position: fixed;
        bottom: 16px;
        left: 16px;
        font-size: 12px;
        font-style: italic;
        opacity: 0.6;
        user-select: text;
        max-width: 60vw;
        line-height: 1.4;
      }
      #weights {
        position: fixed;
        bottom: 16px;
        right: 16px;
        font-size: 12px;
        font-style: italic;
        opacity: 0.6;
        text-align: right;
        line-height: 1.4;
      }

      /* --- Settings panel (full-height, right edge) --- */
      #settings-panel {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        width: 320px;
        background: var(--panel-bg);
        border-left: 1px solid var(--panel-border);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        z-index: 15;
        display: flex;
        flex-direction: column;
        transform: translateX(0);
        transition: transform 220ms ease;
        overflow: hidden;
        --cream: #efe9d8;
        --panel-border: rgba(239, 233, 216, 0.18);
        color: var(--cream);
      }
      #settings-panel.collapsed { transform: translateX(100%); }
      #settings-toggle {
        position: fixed;
        top: 16px;
        right: 336px;
        z-index: 16;
        width: 32px;
        height: 32px;
        background: rgba(10, 10, 10, 0.92);
        border: 1px solid rgba(239, 233, 216, 0.18);
        color: #efe9d8;
        font: inherit;
        font-size: 14px;
        cursor: pointer;
        transition: right 220ms ease, opacity 120ms;
        opacity: 0.7;
      }
      #settings-toggle:hover { opacity: 1; }
      #settings-panel.collapsed ~ #settings-toggle { right: 16px; }

      #settings-panel header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        padding: 16px 18px 12px;
        border-bottom: 1px solid var(--panel-border);
      }
      #settings-panel h3 {
        margin: 0;
        font-size: 13px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        opacity: 0.85;
        font-weight: 500;
      }
      #settings-close {
        background: none;
        border: none;
        color: var(--cream);
        opacity: 0.55;
        font: inherit;
        font-size: 14px;
        cursor: pointer;
        padding: 0 4px;
        line-height: 1;
      }
      #settings-close:hover { opacity: 1; }

      #settings-body {
        flex: 1;
        overflow-y: auto;
        padding: 6px 0 16px;
      }
      #settings-body section {
        padding: 14px 18px 12px;
        border-bottom: 1px solid rgba(239, 233, 216, 0.06);
      }
      #settings-body section:last-child { border-bottom: 0; }
      #settings-body section > label.section-label {
        display: block;
        font-size: 10px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        opacity: 0.5;
        margin-bottom: 10px;
      }
      .field {
        display: grid;
        grid-template-columns: 80px 1fr 44px;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
        font-size: 12px;
      }
      .field > .name { opacity: 0.7; font-style: italic; }
      .field > .value {
        text-align: right;
        font-variant-numeric: tabular-nums;
        opacity: 0.85;
        font-size: 11px;
      }

      /* Range slider — flat track + square thumb */
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 18px;
        background: transparent;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-runnable-track {
        height: 2px;
        background: rgba(239, 233, 216, 0.2);
        border-radius: 0;
      }
      input[type="range"]::-moz-range-track {
        height: 2px;
        background: rgba(239, 233, 216, 0.2);
        border: none;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        height: 12px;
        width: 12px;
        background: var(--accent);
        border: 1px solid #fafaf6;
        border-radius: 0;
        margin-top: -5px;
        cursor: pointer;
      }
      input[type="range"]::-moz-range-thumb {
        height: 12px;
        width: 12px;
        background: var(--accent);
        border: 1px solid #fafaf6;
        border-radius: 0;
        cursor: pointer;
      }

      /* Select dropdown */
      select {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--panel-border);
        color: var(--cream);
        font: inherit;
        font-size: 12px;
        padding: 4px 8px;
        outline: none;
        width: 100%;
        cursor: pointer;
      }
      select:focus { border-color: var(--accent); }
      select option {
        background: #0a0a0a;
        color: var(--cream);
      }

      /* Text input */
      input[type="text"] {
        width: 100%;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--panel-border);
        color: var(--cream);
        padding: 6px 8px;
        font: inherit;
        font-size: 12px;
        outline: none;
      }
      input[type="text"]:focus { border-color: var(--accent); }

      /* Vocab toggle pills inside panel */
      #vocab-toggles {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }
      .vocab-toggle {
        cursor: pointer;
        padding: 4px 10px;
        border: 1px solid rgba(239, 233, 216, 0.2);
        background: rgba(255, 255, 255, 0.02);
        color: var(--cream);
        font: inherit;
        font-size: 11px;
        opacity: 0.5;
        transition: opacity 120ms, border-color 120ms, background 120ms;
        user-select: none;
      }
      .vocab-toggle:hover { opacity: 0.85; border-color: rgba(239, 233, 216, 0.5); }
      .vocab-toggle.active {
        opacity: 1;
        border-color: var(--accent);
        background: rgba(212, 40, 42, 0.12);
      }
      .vocab-toggle .num {
        opacity: 0.55;
        margin-right: 5px;
        font-variant-numeric: tabular-nums;
      }
      .vocab-toggle.active .num { opacity: 0.85; }

      /* Checkboxes — square + red filled with checkmark, matching 3D */
      .check-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        font-style: italic;
        opacity: 0.85;
        margin-bottom: 6px;
        cursor: pointer;
      }
      .check-row input[type="checkbox"] {
        appearance: none;
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        border: 1px solid var(--panel-border);
        background: rgba(255, 255, 255, 0.03);
        cursor: pointer;
        position: relative;
        flex: 0 0 auto;
      }
      .check-row input[type="checkbox"]:checked {
        border-color: var(--accent);
        background: rgba(212, 40, 42, 0.5);
      }
      .check-row input[type="checkbox"]:checked::after {
        content: "✓";
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        font-size: 10px;
        color: var(--cream);
      }
      .check-row.disabled { opacity: 0.4; cursor: not-allowed; }
      .check-row.disabled input { pointer-events: none; }

      /* Seed row — current seed + dedicated re-roll. Lets users isolate a
         single parameter to change while keeping the rest of the aesthetic. */
      .seed-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .seed-row .seed-value {
        font-family: ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace;
        font-size: 13px;
        letter-spacing: 0.1em;
        opacity: 0.9;
        user-select: text;
      }
      .seed-row .seed-btn {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--panel-border);
        color: var(--cream);
        font: inherit;
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 5px 10px;
        cursor: pointer;
        transition: border-color 120ms, background 120ms;
      }
      .seed-row .seed-btn:hover {
        border-color: var(--accent);
        background: rgba(212, 40, 42, 0.1);
      }

      /* Export buttons */
      .btn-row {
        display: flex;
        gap: 6px;
      }
      .btn {
        flex: 1;
        padding: 7px 10px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--panel-border);
        color: var(--cream);
        font: inherit;
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        cursor: pointer;
        transition: border-color 120ms, background 120ms;
      }
      .btn:hover { border-color: var(--accent); background: rgba(212, 40, 42, 0.1); }
      .btn-randomize {
        width: 100%;
        padding: 12px 10px;
        font-size: 12px;
        letter-spacing: 0.18em;
        font-weight: 600;
        background: rgba(212, 40, 42, 0.18);
        border-color: rgba(212, 40, 42, 0.55);
        color: #efe9d8;
      }
      .btn-randomize:hover {
        background: rgba(212, 40, 42, 0.32);
        border-color: var(--accent);
      }

      /* Toast */
      #toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        padding: 8px 14px;
        background: rgba(10, 10, 10, 0.94);
        color: #efe9d8;
        border: 1px solid rgba(239, 233, 216, 0.18);
        font-size: 12px;
        font-style: italic;
        opacity: 0;
        pointer-events: none;
        transition: opacity 220ms;
        max-width: 80vw;
        text-align: center;
        z-index: 20;
      }
      #toast.show { opacity: 1; }
    </style>
    <script type="module" crossorigin src="./assets/scores-BHGwJjqp.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/score-Co1Yh-yA.js">
  </head>
  <body>
    <div id="app">
      <div id="canvas-host"></div>
    </div>
    <div id="title">
      visual scores<span class="small">2d</span><span class="small"><a href="/">3d ↗</a></span>
    </div>
    <div id="hud">
      <div class="row"><span class="k">SPACE</span><span class="v">new seed</span></div>
      <div class="row"><span class="k">S</span><span class="v">save svg</span></div>
      <div class="row"><span class="k">P</span><span class="v">save png</span></div>
      <div class="row"><span class="k">B</span><span class="v">save both</span></div>
      <div class="row"><span class="k">C</span><span class="v">cycle palette</span></div>
      <div class="row"><span class="k">1-5</span><span class="v">toggle vocab</span></div>
      <div class="row"><span class="k">⇧1-5</span><span class="v">solo vocab</span></div>
      <div class="row"><span class="k">0</span><span class="v">all vocabs</span></div>
      <div class="row"><span class="k">G</span><span class="v">grid mode</span></div>
      <div class="row"><span class="k">F</span><span class="v">fit to viewport</span></div>
      <div class="row"><span class="k" style="min-width:0; padding:0; border:0; background:none;">drag</span><span class="v">pan canvas</span></div>
      <div class="row"><span class="k" style="min-width:0; padding:0; border:0; background:none;">wheel</span><span class="v">zoom</span></div>
      <div class="row"><span class="k" style="min-width:0; padding:0; border:0; background:none;">click</span><span class="v">re-roll cell</span></div>
    </div>

    <button id="settings-toggle" type="button" title="toggle settings panel">≡</button>
    <aside id="settings-panel">
      <header>
        <h3>SETTINGS</h3>
        <button id="settings-close" type="button" title="close panel">✕</button>
      </header>
      <div id="settings-body">
        <section>
          <button class="btn btn-randomize" id="btn-randomize-all" type="button" title="Re-roll seed, palette, density, vocab mix">
            ⚄ Randomize All
          </button>
        </section>

        <section>
          <label class="section-label">Seed</label>
          <div class="seed-row">
            <span class="seed-value" id="seed-value">—</span>
            <button class="seed-btn" id="btn-new-seed" type="button" title="Roll a new seed only (Space)">
              ⚄ New
            </button>
          </div>
        </section>

        <section>
          <label class="section-label">Style</label>
          <div class="field">
            <span class="name">palette</span>
            <select id="palette-select" style="grid-column: 2 / span 2;"></select>
          </div>
          <label class="check-row" id="tone-row">
            <input id="tone-toggle" type="checkbox" />
            <span>light tone (flip ink/paper)</span>
          </label>
          <div class="field">
            <span class="name">density</span>
            <input id="density" type="range" min="0.1" max="1.0" step="0.05" />
            <span class="value" id="density-value">—</span>
          </div>
        </section>

        <section>
          <label class="section-label">View</label>
          <label class="check-row">
            <input id="anim-toggle" type="checkbox" />
            <span>animate (drift / trace / bounce)</span>
          </label>
        </section>

        <section>
          <label class="section-label">Vocabulary</label>
          <div id="vocab-toggles">
            <button class="vocab-toggle active" data-vocab="cage" type="button" title="click to toggle, shift+click to solo"><span class="num">1</span>cage</button>
            <button class="vocab-toggle active" data-vocab="penderecki" type="button" title="click to toggle, shift+click to solo"><span class="num">2</span>pend</button>
            <button class="vocab-toggle active" data-vocab="decesare" type="button" title="click to toggle, shift+click to solo"><span class="num">3</span>dec</button>
            <button class="vocab-toggle active" data-vocab="notation" type="button" title="click to toggle, shift+click to solo"><span class="num">4</span>not</button>
            <button class="vocab-toggle active" data-vocab="schematic" type="button" title="click to toggle, shift+click to solo"><span class="num">5</span>sch</button>
          </div>
        </section>

        <section>
          <label class="section-label">Grid</label>
          <label class="check-row">
            <input id="grid-toggle" type="checkbox" />
            <span>enable grid</span>
          </label>
          <div class="field" style="margin-top: 6px;">
            <span class="name">dims</span>
            <input id="grid-dims" type="text" placeholder="3x3" autocomplete="off" spellcheck="false" style="grid-column: 2 / span 2;" />
          </div>
        </section>

        <section>
          <label class="section-label">Export</label>
          <div class="btn-row">
            <button class="btn" id="save-svg" type="button">svg</button>
            <button class="btn" id="save-png" type="button">png</button>
            <button class="btn" id="save-both" type="button">both</button>
          </div>
        </section>
      </div>
    </aside>

    <div id="toast"></div>
    <div id="seed-display">seed: —</div>
    <div id="weights">cage — pend — dec — not — sch —</div>
  </body>
</html>
