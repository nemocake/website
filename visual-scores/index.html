<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="schematic scores — a three.js generator after cage, penderecki, de cesare, lepold.">
  <title>visual scores</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #050505; color: #e5e7eb; font-family: ui-monospace, "SF Mono", Menlo, monospace; overflow: hidden; }
    #app { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; }
    #app .tag { font-size: 11px; letter-spacing: 0.2em; color: #ccff00; opacity: 0.7; }
    #app .title { font-size: clamp(2rem, 6vw, 4rem); letter-spacing: -0.02em; }
    #app .sub { font-size: 12px; color: #888; max-width: 28rem; text-align: center; line-height: 1.6; padding: 0 1rem; }
    .dot { display: inline-block; width: 6px; height: 6px; background: #ccff00; margin-right: 8px; vertical-align: middle; animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <!-- Generator mounts here. Replace this whole #app block with the three.js generator from the visual-scores web-public branch. -->
  <div id="app">
    <div class="tag"><span class="dot"></span>SCHEMATIC_SCORES // COMING_SOON</div>
    <div class="title">visual scores</div>
    <div class="sub">the generator drops here when the public release branch lands.</div>
  </div>
</body>
</html>
